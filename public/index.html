<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>roomworkingAi - AI Conversation Platform</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 roomworkingAi</h1>
            <p>AI conversation and cloud work platform</p>
        </header>

        <main>
            <section class="status-section">
                <h2>System Status</h2>
                <div id="status-info">Loading...</div>
            </section>

            <section class="session-section">
                <h2>Session Management</h2>
                <div class="form-group">
                    <input type="text" id="user-id" placeholder="Enter User ID" />
                    <button onclick="createSession()">Create Session</button>
                    <button onclick="getSessionInfo()">Get Session Info</button>
                    <button onclick="destroySession()">Destroy Session</button>
                </div>
                <div id="session-info"></div>
            </section>

            <section class="cookie-section">
                <h2>Cookie Testing</h2>
                <div class="form-group">
                    <input type="text" id="cookie-name" placeholder="Cookie Name" />
                    <input type="text" id="cookie-value" placeholder="Cookie Value" />
                    <button onclick="setCookie()">Set Cookie</button>
                    <button onclick="getCookie()">Get Cookie</button>
                    <button onclick="clearCookie()">Clear Cookie</button>
                </div>
                <div id="cookie-info"></div>
            </section>

            <section class="ai-section">
                <h2>AI Conversation</h2>
                <div class="form-group">
                    <input type="text" id="conversation-topic" placeholder="Conversation Topic" />
                    <button onclick="startConversation()">Start Conversation</button>
                </div>
                <div class="form-group">
                    <input type="text" id="message-input" placeholder="Type a message..." />
                    <button onclick="sendMessage()">Send Message</button>
                </div>
                <div id="conversation-info"></div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 roomworkingAi - Test Interface</p>
        </footer>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
